server:
  port: 8083
  servlet:
    context-path: /sales

spring:
  application:
    name: arenita-sales-api
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

jwt:
  secret: ${JWT_SECRET:arenita-sales-dev-secret-256bit-key-change-in-prod}
  expiration-ms: 86400000

mcp:
  enabled: true
  server-name: arenita-sales
  version: 1.0.0

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:arenita_sales;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/arenita}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:arenita}
    password: ${SPRING_DATASOURCE_PASSWORD:arenita_secret}
  jpa:
    hibernate:
      ddl-auto: update
